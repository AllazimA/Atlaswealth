<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ─── MATH UTILITIES ─────────────────────────────────────────────────────── */

function pmt(rate, n, pv) {
  if (Math.abs(rate) < 1e-12) return pv / n;
  return (pv * rate * Math.pow(1 + rate, n)) / (Math.pow(1 + rate, n) - 1);
}

function irr(cashflows, guess = 0.005) {
  let r = guess;
  for (let i = 0; i < 300; i++) {
    let f = 0, df = 0;
    for (let t = 0; t < cashflows.length; t++) {
      const d = Math.pow(1 + r, t);
      f  += cashflows[t] / d;
      df -= t * cashflows[t] / (d * (1 + r));
    }
    if (Math.abs(df) < 1e-18) break;
    const r2 = r - f / df;
    if (Math.abs(r2 - r) < 1e-12) { r = r2; break; }
    r = r2 < -0.9999 ? -0.9999 : r2;
  }
  return r;
}

const fmtAED  = v => 'AED ' + Math.round(isNaN(v) ? 0 : v).toLocaleString('en-US');
const fmtPct  = v => (isNaN(v) ? 0 : v).toFixed(2) + '%';
const num     = v => { const n = parseFloat(String(v).replace(/,/g,'')); return isNaN(n) ? 0 : n; };

function maxLTV(type, use, price) {
  if (use === 'inv') return 0.65;
  return type === 'exp'
    ? (price <= 5000000 ? 0.80 : 0.65)
    : (price <= 5000000 ? 0.85 : 0.70);
}

/* ─── MORTGAGE AMORTIZATION ──────────────────────────────────────────────── */

function mortgageSchedule(principal, annualRate, months, propVal) {
  const mr = annualRate / 100 / 12;
  const pay = pmt(mr, months, principal);
  let bal = principal, cumInt = 0, yrBal = principal;
  const rows = [];
  for (let m = 1; m <= months; m++) {
    if (m > 1 && (m - 1) % 12 === 0) yrBal = bal;
    const lifeIns = (yrBal * 0.001) / 12;          // 0.10% p.a. declining
    const propIns = (propVal * 0.0005) / 12;        // 0.05% p.a. flat
    const interest = bal * mr;
    const prin = Math.min(pay - interest, bal);
    bal = Math.max(0, bal - prin);
    cumInt += interest;
    rows.push({ m, pay, prin, interest, lifeIns, propIns, cumInt, bal });
  }
  return { rows, pay };
}

function mortgageAPR(loan, rows, fee) {
  const cf = [-(loan - fee), ...rows.map(r => r.pay)];
  return (Math.pow(1 + irr(cf), 12) - 1) * 100;
}

/* ─── LOAN AMORTIZATION ──────────────────────────────────────────────────── */

function loanSchedule(principal, annualReducing, months, lifeIns) {
  const mr = annualReducing / 100 / 12;
  const pay = pmt(mr, months, principal);
  let bal = principal, yrBal = principal;
  const rows = [];
  for (let m = 1; m <= months; m++) {
    if (m > 1 && (m - 1) % 12 === 0) yrBal = bal;
    const ins = lifeIns ? (yrBal * 0.0008) / 12 : 0;  // 0.08% p.a.
    const interest = bal * mr;
    const prin = Math.min(pay - interest, bal);
    bal = Math.max(0, bal - prin);
    rows.push({ m, pay, prin, interest, ins, bal });
  }
  return { rows, pay };
}

function loanAPR(loan, rows, fee) {
  const cf = [-(loan - fee), ...rows.map(r => r.pay)];
  return (Math.pow(1 + irr(cf), 12) - 1) * 100;
}

// Flat → reducing via IRR (approx as NR seed)
function flatToReducing(flat, n, loan) {
  const flatPay = loan * (1 + flat / 100) / n;
  const seed = (2 * n * (flat / 100)) / (n + 1) / 12;
  const cf = [- loan, ...Array(n).fill(flatPay)];
  return irr(cf, seed) * 12 * 100;
}

function reducingToFlat(r, n) {
  return (r / 100 * (n + 1)) / (2 * n) * 100;
}

/* ─── COMPONENTS ─────────────────────────────────────────────────────────── */

const Badge = ({ s, t }) => <span className={`badge badge-${s}`}>{t}</span>;

function LineBarChart({ rows, type }) {
  const ref = useRef(); const ch = useRef();
  useEffect(() => {
    if (!ref.current || !rows.length) return;
    ch.current?.destroy();
    const step = Math.max(1, Math.floor(rows.length / 72));
    const sr = rows.filter((_, i) => i % step === 0);
    const ctx = ref.current.getContext('2d');
    if (type === 'stacked') {
      ch.current = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sr.map(r => `M${r.m}`),
          datasets: [
            { label: 'Principal', data: sr.map(r => Math.round(r.prin)), backgroundColor: '#1E3A5F' },
            { label: 'Interest',  data: sr.map(r => Math.round(r.interest)), backgroundColor: '#93C5FD' }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { x: { stacked: true, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { color: '#F3F4F6' } }, y: { stacked: true, grid: { color: '#F3F4F6' } } },
          plugins: { legend: { display: false } } }
      });
    } else {
      ch.current = new Chart(ctx, {
        type: 'line',
        data: {
          labels: sr.map(r => `M${r.m}`),
          datasets: [{ label: 'Outstanding Balance', data: sr.map(r => Math.round(r.bal)),
            borderColor: '#1E3A5F', backgroundColor: 'rgba(30,58,95,.07)', fill: true, tension: 0.3, pointRadius: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, grid: { color: '#F3F4F6' } }, x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { color: '#F3F4F6' } } },
          plugins: { legend: { display: false } } }
      });
    }
    return () => ch.current?.destroy();
  }, [rows, type]);
  return <canvas ref={ref} />;
}

function GaugeSVG({ dbr }) {
  const clamped = Math.min(Math.max(dbr, 0), 100);
  const color = dbr > 50 ? '#ef5350' : dbr > 40 ? '#ff9800' : '#43a047';
  const W = 200, H = 115, cx = W / 2, cy = H - 18, R = 75;

  const arc = (pct) => {
    const theta = (pct / 100) * Math.PI;
    return { x: cx - R * Math.cos(theta), y: cy - R * Math.sin(theta) };
  };

  const segments = [
    { pct: 40, col: '#43a047' },
    { pct: 10, col: '#ff9800' },
    { pct: 50, col: '#ef5350' },
  ];

  const buildArc = (start, end, col) => {
    const s = arc(start), e = arc(end);
    const large = (end - start) > 50 ? 1 : 0;
    return <path key={col + start} d={`M${s.x},${s.y} A${R},${R} 0 ${large} 1 ${e.x},${e.y}`}
      fill="none" stroke={col} strokeWidth="12" strokeLinecap="butt" />;
  };

  const needleAngle = (clamped / 100) * 180 - 180; // -180 to 0 degrees
  const nr = R - 8;
  const nx = cx + nr * Math.cos((needleAngle * Math.PI) / 180);
  const ny = cy + nr * Math.sin((needleAngle * Math.PI) / 180);

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      {/* background track */}
      <path d={`M${cx - R},${cy} A${R},${R} 0 0 1 ${cx + R},${cy}`}
        fill="none" stroke="#e0e0e0" strokeWidth="12" />
      {/* coloured segments */}
      {buildArc(0, 40, '#43a047')}
      {buildArc(40, 50, '#ff9800')}
      {buildArc(50, 100, '#ef5350')}
      {/* needle */}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#1a1a1a" strokeWidth="2.5" strokeLinecap="round" />
      <circle cx={cx} cy={cy} r="5" fill="#1a1a1a" />
      {/* labels */}
      <text x={cx - R - 4} y={cy + 14} fontSize="10" fill="#888" textAnchor="end">0%</text>
      <text x={cx + R + 4} y={cy + 14} fontSize="10" fill="#888" textAnchor="start">100%</text>
      <text x={cx} y={cy - R - 6} fontSize="10" fill="#888" textAnchor="middle">50%</text>
      {/* DBR value */}
      <text x={cx} y={cy - 14} fontSize="22" fontWeight="700" fill={color} textAnchor="middle">{dbr.toFixed(1)}%</text>
      <text x={cx} y={cy + 2} fontSize="10" fill="#666" textAnchor="middle">Combined DBR</text>
    </svg>
  );
}

const Disclaimer = () => (
  <div className="disclaimer">
    These calculations are indicative only. Actual mortgage and loan terms, rates, fees, and insurance costs vary by lender. This tool does not constitute financial advice.
  </div>
);

/* ─── FUNDING BAR CHART ──────────────────────────────────────────────────── */

function FundingBarChart({ dp, fees, loan }) {
  const ref = useRef(); const ch = useRef();
  useEffect(() => {
    if (!ref.current) return;
    ch.current?.destroy();
    const ctx = ref.current.getContext('2d');
    ch.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: [''],
        datasets: [
          { label: 'Down Payment',       data: [Math.round(dp)],   backgroundColor: '#059669' },
          { label: 'Buyer Upfront Fees', data: [Math.round(fees)], backgroundColor: '#F59E0B' },
          { label: 'Bank Loan',          data: [Math.round(loan)], backgroundColor: '#1E3A5F' },
        ]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        scales: { x: { stacked: true, display: false }, y: { stacked: true, display: false } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => `${c.dataset.label}: ${fmtAED(c.raw)}` } }
        }
      }
    });
    return () => ch.current?.destroy();
  }, [dp, fees, loan]);
  return <canvas ref={ref} />;
}

/* ─── SETTLEMENT BREAKDOWN ───────────────────────────────────────────────── */

function SettlementBreakdown({ c }) {
  const { price, dp, loan, dld4, dldMort, feeAED, maxL } = c;
  const TITLE_DEED = 520;
  const buyerFees     = dld4 + dldMort + feeAED + TITLE_DEED;
  const hardTotal     = dp + buyerFees;
  const buyerPct      = price > 0 ? hardTotal / price * 100 : 0;
  const bankPct       = price > 0 ? loan / price * 100 : 0;
  const minDPPct      = 100 - maxL;

  return (
    <div className="card">
      <div className="card-title">Transaction Settlement Breakdown</div>

      <div className="settle-cards">
        {/* ── Card 1: Buyer pays day one ── */}
        <div className="settle-card settle-card-buyer">
          <span className="settle-tag settle-tag-buyer">BUYER PAYS — DAY ONE</span>
          <table className="settle-table">
            <tbody>
              <tr>
                <td>Down Payment</td>
                <td style={{fontSize:'.72rem',color:'#6b7a8d',padding:'5px 6px'}}>Min {fmtPct(minDPPct)} of price</td>
                <td style={{fontWeight:600}}>{fmtAED(dp)}</td>

function buildYears(rows) {
  const out = [];
  for (let y = 0; y < Math.ceil(rows.length / 12); y++) {
    const yr = rows.slice(y * 12, Math.min((y + 1) * 12, rows.length));
    const openBal = y === 0 ? (rows[0].bal + rows[0].prin) : rows[y * 12 - 1].bal;
    out.push({
      year: y + 1,
      openBal,
      prin:    yr.reduce((a, r) => a + r.prin, 0),
      interest:yr.reduce((a, r) => a + r.interest, 0),
      lifeIns: yr.reduce((a, r) => a + (r.lifeIns || 0), 0),
      ins:     yr.reduce((a, r) => a + (r.ins || 0), 0),
      closeBal:yr[yr.length - 1].bal,
    });
  }
  return out;
}

function amortSVG(years, isLoan) {
  const maxPay = Math.max(...years.map(y => y.prin + y.interest));
  const bW = Math.max(14, Math.min(28, Math.floor(720 / years.length)));
  const H  = 140;
  const W  = years.length * bW;
  const bars = years.map((y, i) => {
    const iH = ((y.interest / maxPay) * H).toFixed(1);
    const pH = ((y.prin / maxPay) * H).toFixed(1);
    const x  = i * bW + 1;
    const iy = H - +iH - +pH;
    const py = H - +pH;
    return `<rect x="${x}" y="${iy}" width="${bW - 2}" height="${iH}" fill="#90caf9"/>` +
           `<rect x="${x}" y="${py}" width="${bW - 2}" height="${pH}" fill="#0d2137"/>`;
  }).join('');
  const labels = years
    .filter((_, i) => i === 0 || (i + 1) % 5 === 0 || i === years.length - 1)
    .map(y => { const i = y.year - 1; return `<text x="${i * bW + bW / 2}" y="${H + 14}" font-size="8.5" text-anchor="middle" fill="#888">Y${y.year}</text>`; })
    .join('');
  return `<svg width="${W}" height="${H + 22}" style="max-width:100%;display:block">
    ${bars}${labels}
    <rect x="0" y="2" width="10" height="10" fill="#90caf9"/>
    <text x="13" y="11" font-size="8" fill="#777">Interest</text>
    <rect x="55" y="2" width="10" height="10" fill="#0d2137"/>
    <text x="68" y="11" font-size="8" fill="#777">Principal</text>
  </svg>`;
}

  const [s, setS] = useState({
    price: 2000000, dp: 400000, val: 2000000,
    tenor: 25, rateType: 'fixed', fixedRate: 4.50,
    eibor: 3.50, margin: 1.50, eiborReset: 'annual', initFixed: 0,
    appType: 'exp', propUse: 'primary',
    feeType: 'pct', feePct: 1.0, feeAED: 10000,
    income: 50000, existing: 5000,
  });
  const set = (k, v) => setS(p => ({ ...p, [k]: v }));

  const c = useMemo(() => {
    const price = num(s.price), dp = num(s.dp), val = num(s.val);
    const loan = Math.max(0, price - dp);
    const months = num(s.tenor) * 12;
    const income = num(s.income), exist = num(s.existing);

    const nomRate = s.rateType === 'fixed'
      ? num(s.fixedRate)
      : num(s.eibor) + num(s.margin);

    const ltvBase = Math.min(price, val);
    const ltv = ltvBase > 0 ? (loan / ltvBase) * 100 : 0;
    const maxL = maxLTV(s.appType, s.propUse, price) * 100;
    const ltvOK = ltv <= maxL + 0.005;

    const feeAED = s.feeType === 'pct'
      ? loan * num(s.feePct) / 100
      : num(s.feeAED);

    if (!ltvOK) return { ltv, maxL, ltvOK, loan };
    if (loan <= 0 || months <= 0 || nomRate <= 0) return { ltv, maxL, ltvOK: true, loan, empty: true };

    const { rows, pay } = mortgageSchedule(loan, nomRate, months, price);
    const totInt   = pay * months - loan;
    const totLife  = rows.reduce((a, r) => a + r.lifeIns, 0);
    const totProp  = rows.reduce((a, r) => a + r.propIns, 0);
    const dld4     = price * 0.04;
    const dldMort  = loan * 0.0025 + 290;
    const valEst   = 3000;
    const convEst  = 7500;
    const totalCOA = loan + totInt + totLife + totProp + dld4 + dldMort + feeAED + valEst + convEst;
    const allIn    = pay + rows[0].lifeIns + rows[0].propIns;
    const dbr      = income > 0 ? (exist + allIn) / income * 100 : 0;
    const apr      = mortgageAPR(loan, rows, feeAED);

    let shock = null;
    if (s.rateType === 'variable') {
      shock = [0, 1, 2].map(b => {
        const r = nomRate + b;
        const { rows: r2, pay: p2 } = mortgageSchedule(loan, r, months, price);
        const ai2 = p2 + r2[0].lifeIns + r2[0].propIns;
        return { label: b === 0 ? 'Current Rate' : `+${b}% EIBOR`, rate: r,
                 pay: p2, allIn: ai2, dbr: income > 0 ? (exist + ai2) / income * 100 : 0 };
      });
    }

    return { ltv, maxL, ltvOK, loan, nomRate, rows, pay, allIn,
             totInt, totLife, totProp, dld4, dldMort, feeAED, valEst, convEst, totalCOA,
             dbr, apr, months, shock, price, dp };
  }, [s]);

  useEffect(() => {
    onData?.({
      mort: c.allIn || 0,
      income: num(s.income),
      exist: num(s.existing),
    });
  }, [c, s.income, s.existing]);

  const dbrSt = !c.dbr ? 'g' : c.dbr > 50 ? 'r' : c.dbr > 40 ? 'a' : 'g';
  const dbrLbl = dbrSt === 'g' ? 'PASS' : dbrSt === 'a' ? 'CAUTION' : 'BREACH';

  return (
    <div>
      <div className="calc-layout">
        {/* ── INPUTS ── */}
        <div className="left-col">
          <div className="card">
            <div className="card-title">Property &amp; Loan</div>

            <div className="form-group">
              <label className="form-label">Property Price (AED)</label>
              <input className="form-input" type="number" value={s.price} onChange={e=>set('price',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Down Payment (AED)</label>
              <input className="form-input" type="number" value={s.dp} onChange={e=>set('dp',e.target.value)}/>
              <div className="input-hint">
                Loan: {fmtAED(c.loan)} &nbsp;|&nbsp; LTV: {fmtPct(c.ltv)} &nbsp;(max {fmtPct(c.maxL)})
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Bank Valuation (AED)</label>
              <input className="form-input" type="number" value={s.val} onChange={e=>set('val',e.target.value)}/>
              <div className="input-hint">LTV uses lower of purchase price or bank valuation</div>
            </div>
            <div className="form-group">
              <label className="form-label">Tenor — {s.tenor} years</label>
              <div className="slider-row">
                <input type="range" className="slider" min={1} max={25} value={s.tenor}
                  onChange={e=>set('tenor',+e.target.value)}/>
                <span className="slider-val">{s.tenor}y</span>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Applicant Type</label>
              <div className="toggle-group">
                <button className={`toggle-btn${s.appType==='exp'?' active':''}`} onClick={()=>set('appType','exp')}>Expat</button>
                <button className={`toggle-btn${s.appType==='nat'?' active':''}`} onClick={()=>set('appType','nat')}>UAE National</button>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Property Use</label>
              <div className="toggle-group">
                <button className={`toggle-btn${s.propUse==='primary'?' active':''}`} onClick={()=>set('propUse','primary')}>Primary Residence</button>
                <button className={`toggle-btn${s.propUse==='inv'?' active':''}`} onClick={()=>set('propUse','inv')}>Investment / 2nd</button>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Interest Rate</div>
            <div className="form-group">
              <div className="toggle-group">
                <button className={`toggle-btn${s.rateType==='fixed'?' active':''}`} onClick={()=>set('rateType','fixed')}>Fixed</button>
                <button className={`toggle-btn${s.rateType==='variable'?' active':''}`} onClick={()=>set('rateType','variable')}>Variable (EIBOR)</button>
              </div>
            </div>
            {s.rateType === 'fixed' ? (
              <div className="form-group">
                <label className="form-label">Fixed Rate (% p.a.)</label>
                <input className="form-input" type="number" step="0.01" value={s.fixedRate} onChange={e=>set('fixedRate',e.target.value)}/>
              </div>
            ) : (
              <>
                <div className="form-group">
                  <label className="form-label">EIBOR (%)</label>
                  <input className="form-input" type="number" step="0.01" value={s.eibor} onChange={e=>set('eibor',e.target.value)}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Bank Margin (%)</label>
                  <input className="form-input" type="number" step="0.01" value={s.margin} onChange={e=>set('margin',e.target.value)}/>
                  <div className="input-hint">Total Rate: {fmtPct(num(s.eibor)+num(s.margin))}</div>
                </div>
                <div className="form-group">
                  <label className="form-label">EIBOR Reset Frequency</label>
                  <select className="form-select" value={s.eiborReset} onChange={e=>set('eiborReset',e.target.value)}>
                    <option value="annual">Annual</option>
                    <option value="semi">Semi-Annual</option>
                    <option value="quarterly">Quarterly</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Initial Fixed Period</label>
                  <select className="form-select" value={s.initFixed} onChange={e=>set('initFixed',+e.target.value)}>
                    <option value={0}>None</option>
                    <option value={12}>12 months</option>
                    <option value={24}>24 months</option>
                    <option value={36}>36 months</option>
                  </select>
                </div>
              </>
            )}
          </div>

          <div className="card">
            <div className="card-title">Income &amp; Fees</div>
            <div className="form-group">
              <label className="form-label">Gross Monthly Income (AED)</label>
              <input className="form-input" type="number" value={s.income} onChange={e=>set('income',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Existing Monthly Obligations (AED)</label>
              <input className="form-input" type="number" value={s.existing} onChange={e=>set('existing',e.target.value)}/>
              <div className="input-hint">Exclude proposed mortgage</div>
            </div>
            <div className="form-group">
              <label className="form-label">Bank Processing Fee</label>
              <div className="toggle-group" style={{marginBottom:7}}>
                <button className={`toggle-btn${s.feeType==='pct'?' active':''}`} onClick={()=>set('feeType','pct')}>% of Loan</button>
                <button className={`toggle-btn${s.feeType==='aed'?' active':''}`} onClick={()=>set('feeType','aed')}>Fixed AED</button>
              </div>
              {s.feeType==='pct'
                ? <input className="form-input" type="number" step="0.01" value={s.feePct} onChange={e=>set('feePct',e.target.value)} placeholder="%"/>
                : <input className="form-input" type="number" value={s.feeAED} onChange={e=>set('feeAED',e.target.value)} placeholder="AED"/>
              }
              {c.feeAED !== undefined && <div className="input-hint">Fee amount: {fmtAED(c.feeAED)}</div>}
            </div>
          </div>
        </div>

        {/* ── OUTPUTS ── */}
        <div className="right-col">
          {!c.ltvOK && (
            <div className="blocked">
              <div className="blocked-title">LTV Limit Exceeded — Results Blocked</div>
              <div>Current LTV: <strong>{fmtPct(c.ltv)}</strong> &nbsp;|&nbsp; Maximum Allowed: <strong>{fmtPct(c.maxL)}</strong></div>
              <div style={{marginTop:8,fontWeight:400,fontSize:'.82rem'}}>Increase your down payment or reduce the loan amount to proceed.</div>
            </div>
          )}

          {c.ltvOK && !c.empty && c.rows && (<>
            {/* Export button */}
            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button onClick={() => openMortgageReport(c, s)} className="btn-export">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export Full Report
              </button>
            </div>
            {/* Compliance */}
            <div className="card">
              <div className="card-title">Compliance Status</div>
              <div className="compliance-row">
                <span className="compliance-label">LTV Ratio</span>
                <span>{fmtPct(c.ltv)} / {fmtPct(c.maxL)} max &nbsp;<Badge s="g" t="PASS"/></span>
              </div>
              <div className="compliance-row">
                <span className="compliance-label">Debt Burden Ratio (DBR)</span>
                <span><span className="compliance-val">{fmtPct(c.dbr)}</span><Badge s={dbrSt} t={dbrLbl}/></span>
              </div>
              {s.rateType==='variable' && (
                <div className="compliance-row">
                  <span className="compliance-label">Rate Type Disclosure</span>
                  <Badge s="a" t="VARIABLE — EIBOR LINKED"/>
                </div>
              )}
              <div className="compliance-row">
                <span className="compliance-label">Early Settlement (CBUAE)</span>
                <span className="compliance-val" style={{fontSize:'.78rem'}}>min(1% of outstanding balance, AED 10,000)</span>
              </div>
              <div className="compliance-row">
                <span className="compliance-label">Life Insurance</span>
                <span className="compliance-val" style={{fontSize:'.78rem'}}>0.10% p.a. on declining balance</span>
              </div>
              <div className="compliance-row">
                <span className="compliance-label">Property Insurance</span>
                <span className="compliance-val" style={{fontSize:'.78rem'}}>0.05% p.a. of property value</span>
              </div>
            </div>

            {/* Settlement Breakdown */}
            <SettlementBreakdown c={c} />

            {/* Financial Summary */}
            <div className="card">
              <div className="card-title">Financial Summary</div>
              <div className="metric-grid">
                <div className="metric-item"><div className="metric-label">Monthly P+I</div><div className="metric-val">{fmtAED(c.pay)}</div></div>
                <div className="metric-item"><div className="metric-label">Monthly All-In</div><div className="metric-val">{fmtAED(c.allIn)}</div></div>
                <div className="metric-item"><div className="metric-label">Total Interest</div><div className="metric-val">{fmtAED(c.totInt)}</div></div>
                <div className="metric-item"><div className="metric-label">APR (Reducing Balance)</div><div className="metric-val">{fmtPct(c.apr)}</div></div>
                <div className="metric-item"><div className="metric-label">Nominal Rate</div><div className="metric-val">{fmtPct(c.nomRate)}</div></div>
                <div className="metric-item">
                  <div className="metric-label">DBR</div>
                  <div className="metric-val" style={{color:c.dbr>50?'#991B1B':c.dbr>40?'#92400E':'#065F46'}}>{fmtPct(c.dbr)}</div>
                </div>
              </div>
            </div>

            {/* Cost of Acquisition */}
            <div className="card">
              <div className="card-title">True Total Cost of Acquisition</div>
              <table className="cost-table">
                <thead><tr><th>Item</th><th style={{textAlign:'right'}}>Amount</th></tr></thead>
                <tbody>
                  <tr><td>Loan Principal</td><td style={{textAlign:'right'}}>{fmtAED(c.loan)}</td></tr>
                  <tr><td>Total Interest</td><td style={{textAlign:'right'}}>{fmtAED(c.totInt)}</td></tr>
                  <tr><td>Life Insurance (declining balance)</td><td style={{textAlign:'right'}}>{fmtAED(c.totLife)}</td></tr>
                  <tr><td>Property Insurance (flat)</td><td style={{textAlign:'right'}}>{fmtAED(c.totProp)}</td></tr>
                  <tr><td>DLD Transfer Fee (4.00%)</td><td style={{textAlign:'right'}}>{fmtAED(c.dld4)}</td></tr>
                  <tr><td>DLD Mortgage Registration (0.25% + AED 290)</td><td style={{textAlign:'right'}}>{fmtAED(c.dldMort)}</td></tr>
                  <tr><td>Bank Processing Fee</td><td style={{textAlign:'right'}}>{fmtAED(c.feeAED)}</td></tr>
                  <tr className="tr-est"><td>Property Valuation (est.)</td><td>est. AED 2,500 – 3,500</td></tr>
                  <tr className="tr-est"><td>Conveyancing / NOC (est.)</td><td>est. AED 5,000 – 10,000</td></tr>
                  <tr className="tr-total"><td>Total Cost of Acquisition</td><td>{fmtAED(c.totalCOA)}</td></tr>
                </tbody>
              </table>
              <div className="disclaimer" style={{marginTop:10}}>
                Early settlement fee [min(1% outstanding, AED 10,000)] not included — timing varies. Valuation and conveyancing shown as estimates.
              </div>
            </div>

            {/* Rate Shock */}
            {c.shock && (
              <div className="card">
                <div className="card-title">Rate Shock Analysis (EIBOR Scenarios)</div>
                <table className="rate-shock">
                  <thead><tr><th>Scenario</th><th>Rate</th><th>Monthly P+I</th><th>Monthly All-In</th><th>DBR</th></tr></thead>
                  <tbody>
                    {c.shock.map((x, i) => (
                      <tr key={i} style={i===0?{background:'#f7f9fc'}:{}}>
                        <td>{x.label}</td>
                        <td>{fmtPct(x.rate)}</td>
                        <td>{fmtAED(x.pay)}</td>
                        <td>{fmtAED(x.allIn)}</td>
                        <td style={{color: x.dbr>50?'#b71c1c':x.dbr>40?'#e65100':'#2e7d32',fontWeight:600}}>{fmtPct(x.dbr)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </>)}
        </div>
      </div>

      {/* ── CHARTS + AMORTIZATION (full width) ── */}
      {c.ltvOK && !c.empty && c.rows && (<>
        <div className="grid-2" style={{marginTop:24}}>
          <div className="card">
            <div className="card-title">Principal vs Interest Over Time</div>
            <div className="chart-wrap"><LineBarChart rows={c.rows} type="stacked"/></div>
            <div className="chart-legend">
              <span className="chart-legend-item"><span className="leg-dot" style={{background:'#1E3A5F'}}></span>Principal</span>
              <span className="chart-legend-item"><span className="leg-dot" style={{background:'#93C5FD'}}></span>Interest</span>
            </div>
          </div>
          <div className="card">
            <div className="card-title">Balance Reduction Curve</div>
            <div className="chart-wrap"><LineBarChart rows={c.rows} type="line"/></div>
            <div className="chart-legend">
              <span className="chart-legend-item"><span className="leg-dot" style={{background:'#1E3A5F',borderRadius:'50%'}}></span>Outstanding Balance</span>
            </div>
          </div>
        </div>

        <div className="card" style={{marginTop:24}}>
          <div className="card-title">Full Amortization Schedule — {c.rows.length} months ({num(s.tenor)} years)</div>
          <div className="amort-wrap">
            <table className="amort-table">
              <thead>
                <tr>
                  <th style={{textAlign:'center'}}>Mo</th>
                  <th>Payment</th>
                  <th>Principal</th>
                  <th>Interest</th>
                  <th>Life Ins.</th>
                  <th>Cum. Interest</th>
                  <th>Balance</th>
                </tr>
              </thead>
              <tbody>
                {c.rows.map(r => (
                  <tr key={r.m}>
                    <td>{r.m}</td>
                    <td>{fmtAED(r.pay)}</td>
                    <td>{fmtAED(r.prin)}</td>
                    <td>{fmtAED(r.interest)}</td>
                    <td>{fmtAED(r.lifeIns)}</td>
                    <td>{fmtAED(r.cumInt)}</td>
                    <td className="bal-col">{fmtAED(r.bal)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </>)}

      <Disclaimer/>
    </div>
  );
}

/* ─── PERSONAL LOAN CALCULATOR ───────────────────────────────────────────── */

function LoanCalc({ onData }) {
  const [s, setS] = useState({
    amount: 200000, rateType: 'reducing', rate: 8.0,
    tenor: 48, appType: 'exp',
    netSalary: 15000, income: 18000, existing: 2000,
    feeType: 'pct', feePct: 1.0, feeAED: 2000,
    lifeIns: false,
  });
  const set = (k, v) => setS(p => ({ ...p, [k]: v }));

  const c = useMemo(() => {
    const loan    = num(s.amount);
    const tenor   = num(s.tenor);
    const salary  = num(s.netSalary);
    const income  = num(s.income);
    const exist   = num(s.existing);
    const rawRate = num(s.rate);
    const maxT    = s.appType === 'nat' ? 60 : 48;
    const maxL    = salary * 20;

    let reducing, flatEq;
    if (s.rateType === 'flat') {
      reducing = flatToReducing(rawRate, tenor, loan);
      flatEq   = rawRate;
    } else {
      reducing = rawRate;
      flatEq   = reducingToFlat(rawRate, tenor);
    }

    const feeAED = s.feeType === 'pct'
      ? loan * num(s.feePct) / 100
      : num(s.feeAED);

    const salaryOK = loan <= maxL;
    const tenorOK  = tenor <= maxT;

    if (loan <= 0 || tenor <= 0 || reducing <= 0)
      return { salaryOK, tenorOK, maxL, maxT, feeAED, reducing, flatEq, empty: true };

    const { rows, pay } = loanSchedule(loan, reducing, tenor, s.lifeIns);
    const totInt  = pay * tenor - loan;
    const totIns  = rows.reduce((a, r) => a + r.ins, 0);
    const totCost = loan + totInt + totIns + feeAED;
    const dbr     = income > 0 ? (exist + pay) / income * 100 : 0;
    const apr     = loanAPR(loan, rows, feeAED);

    return { salaryOK, tenorOK, maxL, maxT, feeAED, reducing, flatEq,
             rows, pay, totInt, totIns, totCost, dbr, apr, loan, tenor };
  }, [s]);

  useEffect(() => {
    onData?.({ loan: c.pay || 0, income: num(s.income), exist: num(s.existing) });
  }, [c, s.income, s.existing]);

  const dbrSt  = !c.dbr ? 'g' : c.dbr > 50 ? 'r' : c.dbr > 40 ? 'a' : 'g';
  const dbrLbl = dbrSt === 'g' ? 'PASS' : dbrSt === 'a' ? 'CAUTION ≥40%' : 'BREACH >50%';
  const mult   = num(s.netSalary) > 0 ? (num(s.amount) / num(s.netSalary)) : 0;

  return (
    <div>
      <div className="calc-layout">
        {/* ── INPUTS ── */}
        <div className="left-col">
          <div className="card">
            <div className="card-title">Loan Details</div>
            <div className="form-group">
              <label className="form-label">Loan Amount (AED)</label>
              <input className="form-input" type="number" value={s.amount} onChange={e=>set('amount',e.target.value)}/>
              {c.maxL > 0 && (
                <div className={`input-hint${!c.salaryOK?' err':''}`}>
                  Max (20× net salary): {fmtAED(c.maxL)} {!c.salaryOK && '— EXCEEDS LIMIT'}
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">Tenor — {s.tenor} months</label>
              <div className="slider-row">
                <input type="range" className="slider" min={1} max={60} value={s.tenor}
                  onChange={e=>set('tenor',+e.target.value)}/>
                <span className="slider-val">{s.tenor}m</span>
              </div>
              {!c.tenorOK && (
                <div className="input-hint err">
                  Max tenor for {s.appType==='nat'?'UAE National':'Expat'}: {c.maxT} months
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">Applicant Type</label>
              <div className="toggle-group">
                <button className={`toggle-btn${s.appType==='exp'?' active':''}`} onClick={()=>set('appType','exp')}>Expat</button>
                <button className={`toggle-btn${s.appType==='nat'?' active':''}`} onClick={()=>set('appType','nat')}>UAE National</button>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Interest Rate</div>
            <div className="form-group">
              <div className="toggle-group">
                <button className={`toggle-btn${s.rateType==='reducing'?' active':''}`} onClick={()=>set('rateType','reducing')}>Reducing Balance %</button>
                <button className={`toggle-btn${s.rateType==='flat'?' active':''}`} onClick={()=>set('rateType','flat')}>Flat Rate %</button>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">
                {s.rateType==='flat' ? 'Flat Rate (% p.a.)' : 'Reducing Balance Rate (% p.a.)'}
              </label>
              <input className="form-input" type="number" step="0.01" value={s.rate} onChange={e=>set('rate',e.target.value)}/>
              {c.reducing > 0 && c.flatEq > 0 && (
                <div className="input-hint">
                  {s.rateType==='flat'
                    ? `Reducing balance equivalent: ${fmtPct(c.reducing)}`
                    : `Indicative flat rate equivalent: ${fmtPct(c.flatEq)}`}
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">Life Insurance</label>
              <div className="toggle-group">
                <button className={`toggle-btn${!s.lifeIns?' active':''}`} onClick={()=>set('lifeIns',false)}>No</button>
                <button className={`toggle-btn${s.lifeIns?' active':''}`} onClick={()=>set('lifeIns',true)}>Yes — 0.08% p.a. (declining)</button>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Income &amp; Fees</div>
            <div className="form-group">
              <label className="form-label">Net Monthly Salary (AED)</label>
              <input className="form-input" type="number" value={s.netSalary} onChange={e=>set('netSalary',e.target.value)}/>
              <div className="input-hint">Used for 20× salary multiplier check</div>
            </div>
            <div className="form-group">
              <label className="form-label">Gross Monthly Income (AED)</label>
              <input className="form-input" type="number" value={s.income} onChange={e=>set('income',e.target.value)}/>
              <div className="input-hint">Used for DBR calculation</div>
            </div>
            <div className="form-group">
              <label className="form-label">Existing Monthly Obligations (AED)</label>
              <input className="form-input" type="number" value={s.existing} onChange={e=>set('existing',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Processing Fee</label>
              <div className="toggle-group" style={{marginBottom:7}}>
                <button className={`toggle-btn${s.feeType==='pct'?' active':''}`} onClick={()=>set('feeType','pct')}>% of Loan</button>
                <button className={`toggle-btn${s.feeType==='aed'?' active':''}`} onClick={()=>set('feeType','aed')}>Fixed AED</button>
              </div>
              {s.feeType==='pct'
                ? <input className="form-input" type="number" step="0.01" value={s.feePct} onChange={e=>set('feePct',e.target.value)}/>
                : <input className="form-input" type="number" value={s.feeAED} onChange={e=>set('feeAED',e.target.value)}/>
              }
              {c.feeAED !== undefined && <div className="input-hint">Fee amount: {fmtAED(c.feeAED)}</div>}
            </div>
          </div>
        </div>

        {/* ── OUTPUTS ── */}
        <div className="right-col">
          <div className="card">
            <div className="card-title">Compliance Status</div>
            <div className="compliance-row">
              <span className="compliance-label">Salary Multiplier (max 20×)</span>
              <span>
                <span className="compliance-val">{mult > 0 ? mult.toFixed(2) + '×' : '—'}</span>
                <Badge s={c.salaryOK?'g':'r'} t={c.salaryOK?'PASS':'BREACH'}/>
              </span>
            </div>
            <div className="compliance-row">
              <span className="compliance-label">Tenor Limit ({c.maxT} months max)</span>
              <span>
                <span className="compliance-val">{s.tenor}m</span>
                <Badge s={c.tenorOK?'g':'r'} t={c.tenorOK?'PASS':'BREACH'}/>
              </span>
            </div>
            <div className="compliance-row">
              <span className="compliance-label">Debt Burden Ratio (DBR)</span>
              <span>
                <span className="compliance-val">{c.dbr ? fmtPct(c.dbr) : '—'}</span>
                <Badge s={dbrSt} t={dbrLbl}/>
              </span>
            </div>
            <div className="compliance-row">
              <span className="compliance-label">Early Settlement (CBUAE)</span>
              <span className="compliance-val" style={{fontSize:'.78rem'}}>min(1% outstanding, AED 10,000)</span>
            </div>
            {!c.salaryOK && (
              <div className="alert-r" style={{marginTop:10}}>
                <strong>Loan amount exceeds maximum permitted.</strong> CBUAE limits personal loans to 20× net monthly salary ({fmtAED(c.maxL)}).
              </div>
            )}
            {!c.tenorOK && (
              <div className="alert-r" style={{marginTop:8}}>
                <strong>Tenor exceeds {c.maxT}-month limit</strong> for {s.appType==='nat'?'UAE Nationals':'Expats'}.
              </div>
            )}
            {c.dbr > 50 && (
              <div className="alert-r" style={{marginTop:8}}>
                <strong>DBR exceeds 50% hard cap.</strong> CBUAE requires rejection when total obligations exceed 50% of gross income.
              </div>
            )}
            {c.dbr > 40 && c.dbr <= 50 && (
              <div className="alert-a" style={{marginTop:8}}>
                <strong>DBR above 40% caution threshold.</strong> Lenders may apply stricter scrutiny.
              </div>
            )}
          </div>

          {!c.empty && c.rows && (<>
            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button onClick={() => openLoanReport(c, s)} className="btn-export">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export Full Report
              </button>
            </div>
            <div className="card">
              <div className="card-title">Financial Summary</div>
              <div className="metric-grid">
                <div className="metric-item"><div className="metric-label">Monthly Payment</div><div className="metric-val">{fmtAED(c.pay)}</div></div>
                <div className="metric-item"><div className="metric-label">Total Interest</div><div className="metric-val">{fmtAED(c.totInt)}</div></div>
                <div className="metric-item"><div className="metric-label">APR (Reducing Balance)</div><div className="metric-val">{fmtPct(c.apr)}</div></div>
                <div className="metric-item"><div className="metric-label">Flat Rate Equivalent</div><div className="metric-val">{fmtPct(c.flatEq)}</div></div>
                <div className="metric-item"><div className="metric-label">Processing Fee</div><div className="metric-val">{fmtAED(c.feeAED)}</div></div>
                {s.lifeIns && <div className="metric-item"><div className="metric-label">Total Life Insurance</div><div className="metric-val">{fmtAED(c.totIns)}</div></div>}
                <div className="metric-item"><div className="metric-label">Total Cost</div><div className="metric-val">{fmtAED(c.totCost)}</div></div>
                <div className="metric-item">
                  <div className="metric-label">DBR</div>
                  <div className="metric-val" style={{color:c.dbr>50?'#991B1B':c.dbr>40?'#92400E':'#065F46'}}>{fmtPct(c.dbr)}</div>
                </div>
              </div>
            </div>
          </>)}
        </div>
      </div>

      {!c.empty && c.rows && (<>
        <div className="card" style={{marginTop:24}}>
          <div className="card-title">Balance Reduction Curve</div>
          <div className="chart-wrap"><LineBarChart rows={c.rows} type="line"/></div>
          <div className="chart-legend">
            <span className="chart-legend-item"><span className="leg-dot" style={{background:'#1E3A5F',borderRadius:'50%'}}></span>Outstanding Balance</span>
          </div>
        </div>

        <div className="card" style={{marginTop:24}}>
          <div className="card-title">Amortization Schedule — {c.rows.length} months</div>
          <div className="amort-wrap">
            <table className="amort-table">
              <thead>
                <tr>
                  <th>Mo</th>
                  <th>Payment</th>
                  <th>Principal</th>
                  <th>Interest</th>
                  {s.lifeIns && <th>Life Ins.</th>}
                  <th>Balance</th>
                </tr>
              </thead>
              <tbody>
                {c.rows.map(r => (
                  <tr key={r.m}>
                    <td>{r.m}</td>
                    <td>{fmtAED(r.pay)}</td>
                    <td>{fmtAED(r.prin)}</td>
                    <td>{fmtAED(r.interest)}</td>
                    {s.lifeIns && <td>{fmtAED(r.ins)}</td>}
                    <td className="bal-col">{fmtAED(r.bal)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </>)}

      <Disclaimer/>
    </div>
  );
}

/* ─── COMBINED DBR VIEW ──────────────────────────────────────────────────── */

function CombinedDBR({ mortData, loanData }) {
  const mortObl  = mortData?.mort   || 0;
  const loanObl  = loanData?.loan   || 0;
  const existObl = Math.max(mortData?.exist || 0, loanData?.exist || 0);
  const income   = Math.max(mortData?.income || 0, loanData?.income || 0);
  const totalObl = mortObl + loanObl + existObl;
  const dbr      = income > 0 ? (totalObl / income) * 100 : 0;
  const dbrSt    = dbr > 50 ? 'r' : dbr > 40 ? 'a' : 'g';

  return (
    <div>
      <div className="card">
        <div className="card-title">Combined Debt Burden Ratio Dashboard</div>
        <div className="dbr-gauge-wrap">
          <div style={{flexShrink:0}}>
            <GaugeSVG dbr={dbr}/>
            <div style={{textAlign:'center',marginTop:6}}>
              <Badge
                s={dbrSt}
                t={dbrSt==='g'?'ACCEPTABLE':dbrSt==='a'?'CAUTION ≥40%':'BREACH >50%'}
              />
            </div>
          </div>
          <div className="dbr-rows">
            <div className="dbr-row">
              <span>Mortgage Monthly Obligation (P+I + Insurance)</span>
              <span style={{fontWeight:600}}>{fmtAED(mortObl)}</span>
            </div>
            <div className="dbr-row">
              <span>Personal Loan Monthly Payment</span>
              <span style={{fontWeight:600}}>{fmtAED(loanObl)}</span>
            </div>
            <div className="dbr-row">
              <span>Existing Monthly Obligations</span>
              <span style={{fontWeight:600}}>{fmtAED(existObl)}</span>
            </div>
            <div className="dbr-row total">
              <span>Total Monthly Obligations</span>
              <span>{fmtAED(totalObl)}</span>
            </div>
            <div className="dbr-row" style={{marginTop:12}}>
              <span>Gross Monthly Income</span>
              <span style={{fontWeight:600}}>{fmtAED(income)}</span>
            </div>
            <div className="dbr-row total" style={{fontSize:'1rem'}}>
              <span>Combined DBR</span>
              <span style={{color:dbr>50?'#b71c1c':dbr>40?'#e65100':'#2e7d32',fontWeight:700}}>
                {fmtPct(dbr)}
              </span>
            </div>
          </div>
        </div>

        {dbr > 50 && (
          <div className="alert-r">
            <strong>DBR Breach:</strong> Combined obligations exceed 50% of gross income. CBUAE regulations require lenders to reject applications where DBR exceeds 50%.
          </div>
        )}
        {dbr > 40 && dbr <= 50 && (
          <div className="alert-a">
            <strong>Caution:</strong> Combined DBR exceeds 40%. While within CBUAE limits, lenders may apply stricter scrutiny above this threshold.
          </div>
        )}
        {(mortObl === 0 || loanObl === 0) && (
          <div className="info-box">
            Enter values in both the Mortgage Calculator and Personal Loan Calculator tabs to see a full combined DBR analysis.
          </div>
        )}
        <div className="info-box" style={{marginTop:8}}>
          CBUAE regulations require lenders to assess total debt burden across all obligations. DBR = total monthly obligations ÷ gross monthly income × 100.
        </div>
      </div>

      {/* DBR scale reference */}
      <div className="card">
        <div className="card-title">DBR Threshold Reference</div>
        <table className="cost-table">
          <thead><tr><th>DBR Range</th><th>Status</th><th>CBUAE Guidance</th></tr></thead>
          <tbody>
            <tr><td>0% – 40%</td><td><Badge s="g" t="ACCEPTABLE"/></td><td>Within standard lending guidelines</td></tr>
            <tr><td>40% – 50%</td><td><Badge s="a" t="CAUTION"/></td><td>Elevated — lenders may apply additional conditions</td></tr>
            <tr><td>Above 50%</td><td><Badge s="r" t="BREACH"/></td><td>Exceeds CBUAE hard cap — loan must be declined</td></tr>
          </tbody>
        </table>
      </div>

      <Disclaimer/>
    </div>
  );
}

/* ─── APP ROOT ───────────────────────────────────────────────────────────── */

function App() {
  const [tab, setTab] = useState(0);
  const [mortData, setMortData] = useState({});
  const [loanData, setLoanData] = useState({});

  return (
    <div>
      <div className="app-header">
        <h1>UAE Financial Calculator</h1>
        <p>CBUAE-Compliant Mortgage &amp; Personal Loan Analysis — All calculations run client-side</p>
      </div>
      <div className="tab-nav">
        <div className="tab-pill-wrap">
          {['Mortgage Calculator','Personal Loan Calculator','Combined DBR View'].map((t,i)=>(
            <button key={i} className={`tab-btn${tab===i?' active':''}`} onClick={()=>setTab(i)}>{t}</button>
          ))}
        </div>
      </div>
      <div className="container">
        {tab===0 && <MortgageCalc onData={setMortData}/>}
        {tab===1 && <LoanCalc onData={setLoanData}/>}
        {tab===2 && <CombinedDBR mortData={mortData} loanData={loanData}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
